name: Deploy Static Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Prepare static site artifact
        run: |
          mkdir -p site-dist/assets/css site-dist/assets/js site-dist/awards site-dist/setups site-dist/publications
          cp index.html 404.html .nojekyll site-dist/
          cp awards/index.html site-dist/awards/
          cp setups/index.html site-dist/setups/
          cp publications/index.html site-dist/publications/
          cp assets/css/site.css site-dist/assets/css/
          cp assets/js/site.js assets/js/site-data.js site-dist/assets/js/
          cp -R assets/files site-dist/assets/
          cp -R assets/images site-dist/assets/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
